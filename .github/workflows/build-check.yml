name: Build check (non-main)

# Verifies the Docusaurus site builds on PRs and non-main branches.
# Does NOT deploy — deploy is main-only in deploy.yml.

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
